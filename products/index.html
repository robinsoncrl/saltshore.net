<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products – SaltShore Systems</title>
  <meta name="description" content="SaltShore Systems products — modular, reliable software tools.">
  <meta name="theme-color" content="#004466">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon/favicon-16.png">
  <link rel="shortcut icon" href="../assets/favicon/favicon.ico">
  <style>
    body { margin: 0; padding: 0; }
    main { max-width: 700px; margin: 0 auto; padding: 48px 24px 64px 24px; }
    main h1 { font-size: 2rem; color: #004466; margin-bottom: 24px; line-height: 1.2; }
    main h2 { font-size: 1.25rem; color: #004466; margin-top: 36px; margin-bottom: 10px; line-height: 1.3; }
    main p { font-size: 1.05rem; line-height: 1.7; margin-bottom: 20px; color: #222; }
    main section { margin-bottom: 32px; }
  </style>
</head>
<body>

  <!-- Shared header include -->
  <div id="header-placeholder"></div>
  <script>
    fetch('/partials/header.html')
      .then(r => r.text())
      .then(html => {
        document.getElementById('header-placeholder').innerHTML = html;
        var a = document.querySelector('.main-nav a[href="/products"]');
        if (a) a.classList.add('active');
      });
  </script>

  <main>
    <h1>SaltShore Products</h1>
    <section>
      <h2>CalGen</h2>
      <p>A modular calendar-generation engine for structured workflows.</p>
    </section>
    <section>
      <h2>Vibe Coding</h2>
      <p>Dashboard utilities and workflow automation for small businesses.</p>
    </section>
  </main>

  <!-- Shared footer include -->
  <div id="footer-placeholder"></div>
  <script>
    fetch('/partials/footer.html')
      .then(r => r.text())
      .then(html => document.getElementById('footer-placeholder').innerHTML = html);
  </script>

</body>
</html>
