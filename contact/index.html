<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact – SaltShore Systems</title>
  <meta name="description" content="Contact SaltShore Systems — get in touch with our team.">
  <meta name="theme-color" content="#004466">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon/favicon-16.png">
  <link rel="shortcut icon" href="../assets/favicon/favicon.ico">
  <style>
    body { margin: 0; padding: 0; }
    .centered-page {
      max-width: 700px;
      margin: 0 auto;
      padding: 48px 24px 64px 24px;
      text-align: center;
    }
    .centered-page h1 {
      font-size: 2rem;
      color: #004466;
      margin-bottom: 12px;
      line-height: 1.2;
    }
    .centered-page .lead {
      font-size: 1.15rem;
      color: #6b7a89;
      margin-bottom: 40px;
      line-height: 1.7;
    }
    .content-block {
      text-align: left;
      margin-bottom: 32px;
    }
    .content-block h2 {
      font-size: 1.1rem;
      color: #004466;
      margin-bottom: 6px;
      margin-top: 28px;
    }
    .content-block h2:first-child { margin-top: 0; }
    .content-block p {
      font-size: 1.05rem;
      line-height: 1.7;
      color: #222;
      margin: 0 0 8px 0;
    }
    .content-block a { color: #004466; }
  </style>
</head>
<body>

  <!-- Shared header include -->
  <div id="header-placeholder"></div>
  <script>
    fetch('/partials/header.html')
      .then(r => r.text())
      .then(html => {
        document.getElementById('header-placeholder').innerHTML = html;
        var a = document.querySelector('.main-nav a[href="/contact"]');
        if (a) a.classList.add('active');
      });
  </script>

  <main class="centered-page">
    <section>
      <h1>Let's connect.</h1>
      <p class="lead">
        Whether you're exploring SaltShore tools or looking for workflow guidance,
        we're here to help.
      </p>
    </section>

    <section class="content-block">
      <h2>Email</h2>
      <p><a href="mailto:support@saltshore.net">support@saltshore.net</a></p>

      <h2>General Inquiries</h2>
      <p><a href="mailto:info@saltshore.net">info@saltshore.net</a></p>

      <h2>Support Hours</h2>
      <p>Monday&ndash;Friday<br>9am&ndash;5pm EST</p>
    </section>
  </main>

  <!-- Shared footer include -->
  <div id="footer-placeholder"></div>
  <script>
    fetch('/partials/footer.html')
      .then(r => r.text())
      .then(html => document.getElementById('footer-placeholder').innerHTML = html);
  </script>

</body>
</html>
